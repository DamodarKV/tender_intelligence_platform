<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{

font-family:Arial;

background:#f2f2f2;

}

.login-box{

width:350px;

margin:100px auto;

background:white;

padding:30px;

border-radius:10px;

box-shadow:0 0 10px #ccc;

}

input{

width:100%;

padding:10px;

margin-top:10px;

}

button{

width:100%;

padding:10px;

margin-top:20px;

background:#007bff;

color:white;

border:none;

}

.error{

color:red;

}

</style>

</head>

<body>

<div class="login-box">

<h2 align="center">Tender Platform Login</h2>

{% if error %}

<p class="error">{{error}}</p>

{% endif %}

<form action="/login" method="post">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>

Login

</button>

</form>

</div>

</body>

</html>
